    <!-- Limpio: se eliminó script inyectado por Kaspersky. --><style>
        body {

    <!-- Firebase / Firestore para ranking global -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

        const firebaseConfig = {
  apiKey: "AIzaSyAlny3Yw6K_NFpr9i_-bbcuM6k9FAAHCME",
  authDomain: "juego-matematico-a076a.firebaseapp.com",
  projectId: "juego-matematico-a076a",
  storageBucket: "juego-matematico-a076a.firebasestorage.app",
  messagingSenderId: "397425026040",
  appId: "1:397425026040:web:017d85cab14a57c6eb6c0d"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const COLECCION_PUNTAJES = "puntajes";

        function normalizarPartida(partida) {
            return {
                nombre: String(partida.nombre || "Jugador").trim().slice(0, 30),
                puntos: Number(partida.puntos) || 0,
                duracion: String(partida.duracion || "0m 0s"),
                segundos: Number(partida.segundos) || 0,
                fecha: String(partida.fecha || new Date().toLocaleDateString()),
                timestamp: Number(partida.timestamp) || Date.now()
            };
        }
        function ordenarRankingGlobal(historial) {
            return historial.sort((a,b)=>(Number(b.puntos)||0)-(Number(a.puntos)||0) || (Number(a.segundos)||0)-(Number(b.segundos)||0) || (Number(b.timestamp)||0)-(Number(a.timestamp)||0));
        }
        window.guardarPuntajeGlobal = async function(partida) {
            const limpia = normalizarPartida(partida);
            console.log("Guardando puntaje global:", limpia);
            await addDoc(collection(db, COLECCION_PUNTAJES), limpia);
            return limpia;
        };
        window.cargarRankingGlobal = async function() {
            const snapshot = await getDocs(collection(db, COLECCION_PUNTAJES));
            const ranking = [];
            snapshot.forEach(doc => ranking.push(normalizarPartida(doc.data())));
            return ordenarRankingGlobal(ranking).slice(0, 20);
        };
        window.firebaseRankingListo = true;
        window.dispatchEvent(new Event('firebase-ranking-listo'));
    </script>

            const valorTexto = valor + '%';
            if (tipo === 'musica') {
                document.querySelectorAll('#vol-musica, #vol-musica-juego').forEach(el => el.value = valor);
                document.querySelectorAll('#val-vol-musica, #val-vol-musica-juego').forEach(el => el.innerText = valorTexto);
            } else {
                document.querySelectorAll('#vol-efectos, #vol-efectos-juego').forEach(el => el.value = valor);
                document.querySelectorAll('#val-vol-efectos, #val-vol-efectos-juego').forEach(el => el.innerText = valorTexto);
            }
        }

        function establecerVolumenMusica(valor, guardar = true) {
            valor = Math.max(0, Math.min(100, parseInt(valor, 10) || 0));
            globalVolMusica = valor / 100;
            if (guardar) localStorage.setItem('volMusica', valor);
            sincronizarControlVolumen('musica', valor);
            testAudioMusica.volume = globalVolMusica;
            if (audioFondo) audioFondo.volume = globalVolMusica;
        }

        function establecerVolumenEfectos(valor, guardar = true) {
            valor = Math.max(0, Math.min(100, parseInt(valor, 10) || 0));
            globalVolEfectos = valor / 100;
            if (guardar) localStorage.setItem('volEfectos', valor);
            sincronizarControlVolumen('efectos', valor);
            testAudioEfecto.volume = globalVolEfectos;
            const video = document.getElementById('video-ganador');
            if (video) video.volume = globalVolEfectos;
        }

        document.addEventListener("DOMContentLoaded", () => {
            // En esta versión se reinicia una sola vez el volumen predeterminado a 50%.
            // Después de eso, los cambios del usuario quedan guardados normalmente.
            if (localStorage.getItem('versionVolumenJuego') !== VERSION_VOLUMEN_DEFAULT) {
                localStorage.setItem('volMusica', '50');
                localStorage.setItem('volEfectos', '50');
                localStorage.setItem('versionVolumenJuego', VERSION_VOLUMEN_DEFAULT);
            }

            const volMusicaGuardado = localStorage.getItem('volMusica') || '50';
            const volEfectosGuardado = localStorage.getItem('volEfectos') || '50';
            establecerVolumenMusica(volMusicaGuardado, false);
            establecerVolumenEfectos(volEfectosGuardado, false);

            actualizarPantallaHistorial();
            canvas = document.getElementById("canvas-linea");
            ctx = canvas.getContext("2d");
            ajustarCanvas();
            window.addEventListener("resize", ajustarCanvas);
        });

        // FUNCIONES PARA EL POTENCIÓMETRO DE MÚSICA
        function probarVolumenMusica(valor) {
            establecerVolumenMusica(valor);
            if (testAudioMusica.paused) {
                testAudioMusica.play().catch(e => console.log("Se requiere interacción previa del usuario"));
            }
            clearTimeout(timeoutMusica);
            timeoutMusica = setTimeout(() => {
                testAudioMusica.pause();
            }, 1500);
        }

        // FUNCIONES PARA EL POTENCIÓMETRO DE EFECTOS
        function probarVolumenEfectos(valor) {
            establecerVolumenEfectos(valor);
            if (testAudioEfecto.paused) {
                testAudioEfecto.currentTime = 0;
                testAudioEfecto.play().catch(e => console.log("Se requiere interacción previa del usuario"));
            }
        }

        function ajustarCanvas() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = Math.floor(window.innerWidth * dpr);
            canvas.height = Math.floor(window.innerHeight * dpr);
            canvas.style.width = window.innerWidth + "px";
            canvas.style.height = window.innerHeight + "px";
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        const pares = [
            { id: 0, q: '<span class="raiz-container">1</span>', a: "1" }, 
            { id: 1, q: '<span class="raiz-container">4</span>', a: "2" },
            { id: 2, q: '<span class="raiz-container">9</span>', a: "3" }, 
            { id: 3, q: '<span class="raiz-container">16</span>', a: "4" },
            { id: 4, q: '<span class="raiz-container">25</span>', a: "5" }, 
            { id: 5, q: '<span class="raiz-container">36</span>', a: "6" },
            { id: 6, q: '<span class="raiz-container">49</span>', a: "7" }, 
            { id: 7, q: '<span class="raiz-container">64</span>', a: "8" },
            { id: 8, q: '<span class="raiz-container">81</span>', a: "9", bonus: true }, 
            { id: 9, q: '<span class="raiz-container">100</span>', a: "10", bonus: true },
            { id: 10, q: '<span class="raiz-container">121</span>', a: "11", bonus: true }, 
            { id: 11, q: '<span class="raiz-container">144</span>', a: "12", bonus: true },
            { id: 12, q: "1²", a: "1" }, 
            { id: 13, q: "2²", a: "4" }, 
            { id: 14, q: "3²", a: "9" }, 
            { id: 15, q: "4²", a: "16" },
            { id: 16, q: "5²", a: "25" }, 
            { id: 17, q: "6²", a: "36" }, 
            { id: 18, q: "7²", a: "49" }, 
            { id: 19, q: "8²", a: "64" },
            { id: 20, q: "9²", a: "81", bonus: true }, 
            { id: 21, q: "10²", a: "100", bonus: true }, 
            { id: 22, q: "11²", a: "121", bonus: true }, 
            { id: 23, q: "12²", a: "144", bonus: true }
        ];

        const corr = ["im/Correcta1.png", "im/Correcta2.png", "im/Correcta3.png"];
        const incorr = ["im/incorrecta1.png", "im/incorrecta2.png", "im/incorrecta3.png"];

        let seleccionadoId = null; 
        let botonPreguntaActivo = null;
        let estaArrastrando = false;
        let puntoInicioX = 0, puntoInicioY = 0;
        let totalPuntos = 0, aciertosContador = 0;
        const totalParejas = pares.length;
        let nombreUsuario = "", tiempoInicio = null;


        function activarPantallaCompleta() {
            const elem = document.documentElement;
            if (!document.fullscreenElement && elem.requestFullscreen) {
                elem.requestFullscreen().catch(err => {});
            }
        }

        function toggleMenuControles() {
            const menu = document.getElementById('menu-controles');
            if (menu) menu.classList.toggle('cerrado');
        }

        let recursosPrecargados = false;
        const cacheImagenesJuego = [];
        const cacheAudiosJuego = [];

        function precargarRecursosJuego() {
            if (recursosPrecargados) return;
            recursosPrecargados = true;

            const imagenes = [
                ...corr,
                ...incorr,
                'im/pngwing.com.png',
                'im/pngwing.com (1).png',
                'im/fin_juego.png'
            ];
            imagenes.forEach(src => {
                const img = new Image();
                img.src = src;
                cacheImagenesJuego.push(img);
            });

            const audios = [
                ...audiosMúsica,
                ...audiosCorrectos,
                ...audiosIncorrectos,
                'au/Go.mp3',
                'au/reset.mp3'
            ];
            audios.forEach(src => {
                const audio = new Audio();
                audio.preload = 'auto';
                audio.src = src;
                audio.volume = 0;
                audio.load();
                cacheAudiosJuego.push(audio);
            });

            const video = document.getElementById('video-ganador');
            if (video) {
                video.preload = 'auto';
                video.load();
            }
        }

        function obtenerSegundosDuracion(duracion) {
            if (!duracion) return Number.MAX_SAFE_INTEGER;
            const texto = String(duracion);
            const min = texto.match(/(\d+)\s*m/);
            const seg = texto.match(/(\d+)\s*s/);
            return (min ? parseInt(min[1], 10) * 60 : 0) + (seg ? parseInt(seg[1], 10) : 0);
        }

        function ordenarHistorial(historial) {
            return historial.sort((a, b) => {
                const puntosA = Number(a.puntos) || 0;
                const puntosB = Number(b.puntos) || 0;
                const tiempoA = Number.isFinite(Number(a.segundos)) ? Number(a.segundos) : obtenerSegundosDuracion(a.duracion);
                const tiempoB = Number.isFinite(Number(b.segundos)) ? Number(b.segundos) : obtenerSegundosDuracion(b.duracion);
                const fechaA = Number(a.timestamp) || 0;
                const fechaB = Number(b.timestamp) || 0;
                return (puntosB - puntosA) || (tiempoA - tiempoB) || (fechaB - fechaA);
            });
        }

        function modoPruebaFinal() {
            activarPantallaCompleta();
            precargarRecursosJuego();
            const menu = document.getElementById('menu-controles');
            if (menu) menu.classList.add('cerrado');
            if (!confirm("Modo prueba: se completará la partida automáticamente para revisar el final. ¿Continuar?")) return;

            if (!nombreUsuario) {
                const inputNombre = document.getElementById('nombre-jugador');
                nombreUsuario = (inputNombre && inputNombre.value.trim()) ? inputNombre.value.trim() : "Prueba";
                document.getElementById('jugador-actual').innerText = `Jugador: ${nombreUsuario}`;
            }

            document.getElementById('pantalla-login').style.display = 'none';
            if (!tiempoInicio) tiempoInicio = new Date(Date.now() - 1000);

            totalPuntos = pares.reduce((total, pareja) => total + (pareja.bonus ? 30 : 10), 0);
            aciertosContador = totalParejas;
            document.getElementById('puntos').innerText = totalPuntos;

            document.querySelectorAll('.btn-q, .btn-a').forEach(btn => {
                btn.style.display = 'none';
                btn.classList.remove('selected');
            });

            seleccionadoId = null;
            botonPreguntaActivo = null;
            estaArrastrando = false;
            if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
            setTimeout(activarPantallaVictoria, 300);
        }

        function iniciarJuego() {
            const input = document.getElementById('nombre-jugador');
            if (input.value.trim() === "") {
                alert("Por favor, ingresa un nombre válido para comenzar.");
                return;
            }
            
            // Detenemos cualquier testeo de audio que estuviera sonando
            testAudioMusica.pause();
            testAudioEfecto.pause();

            nombreUsuario = input.value.trim();
            document.getElementById('jugador-actual').innerText = `Jugador: ${nombreUsuario}`;
            
            let audioGo = new Audio("au/Go.mp3");
            audioGo.volume = globalVolEfectos; // Aplicamos volumen maestro de efectos
            audioGo.play().catch(e => console.log("Audio Bloqueado"));

            document.getElementById('pantalla-login').style.display = 'none';
            activarPantallaCompleta();
            tiempoInicio = new Date();
            precargarRecursosJuego();

            reproducirMusicaAleatoria();
        }

        function reproducirMusicaAleatoria() {
            const cancionElegida = audiosMúsica[Math.floor(Math.random() * audiosMúsica.length)];
            audioFondo = new Audio(cancionElegida);
            audioFondo.loop = true;
            audioFondo.volume = globalVolMusica; // Aplicamos volumen maestro de música
            audioFondo.play().catch(e => console.log("Música en espera"));
        }

        function ejecutarReset() {
            let audioReset = new Audio("au/reset.mp3");
            audioReset.volume = globalVolEfectos;
            audioReset.play().catch(e => {});
            setTimeout(() => { location.reload(); }, 500);
        }

        function cerrarJuego() {
            if (confirm("¿Seguro que deseas salir del juego y cerrar la página?")) {
                window.close();
                setTimeout(() => { alert("Para salir por completo, cierra la pestaña."); }, 300);
            }
        }

        function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }
        
        const preg = shuffle([...pares]);
        const resp = shuffle([...pares]);

        const colPreguntas = document.getElementById('col-preguntas');
        preg.forEach(p => {
            const btn = document.createElement('button');
            btn.className = 'btn-q'; btn.innerHTML = p.q; btn.dataset.id = p.id;
            btn.addEventListener('mousedown', (e) => iniciarArrastre(btn, p.id, e.clientX, e.clientY));
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const t = e.touches[0]; iniciarArrastre(btn, p.id, t.clientX, t.clientY);
            }, {passive: false});
            colPreguntas.appendChild(btn);
        });
        
        const colRespuestas = document.getElementById('col-respuestas');
        resp.forEach(r => {
            const btn = document.createElement('button');
            btn.className = 'btn-a'; btn.innerText = r.a; btn.dataset.id = r.id; 
            colRespuestas.appendChild(btn);
        });

        window.addEventListener('mousemove', (e) => moverArrastre(e.clientX, e.clientY));
        window.addEventListener('touchmove', (e) => {
            if (!estaArrastrando) return;
            e.preventDefault();
            const t = e.touches[0]; moverArrastre(t.clientX, t.clientY);
        }, {passive: false});

        window.addEventListener('mouseup', (e) => finalizarArrastre(e.clientX, e.clientY));
        window.addEventListener('touchend', (e) => {
            if (!estaArrastrando) return;
            const t = e.changedTouches[0]; finalizarArrastre(t.clientX, t.clientY);
        });

        function iniciarArrastre(btn, id, clientX, clientY) {
            document.querySelectorAll('.btn-q').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            seleccionadoId = id; botonPreguntaActivo = btn; estaArrastrando = true;
            const rect = btn.getBoundingClientRect();
            puntoInicioX = rect.left + rect.width / 2; puntoInicioY = rect.top + rect.height / 2;
        }

        function moverArrastre(clientX, clientY) {
            if (!estaArrastrando) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath(); ctx.moveTo(puntoInicioX, puntoInicioY); ctx.lineTo(clientX, clientY);
            ctx.strokeStyle = '#00d2ff'; ctx.lineWidth = 6; ctx.lineCap = 'round';
            ctx.shadowBlur = 12; ctx.shadowColor = 'rgba(0, 210, 255, 0.8)'; ctx.stroke();
        }

        function finalizarArrastre(clientX, clientY) {
            if (!estaArrastrando) return;
            estaArrastrando = false;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let elementoDestino = document.elementFromPoint(clientX, clientY);
            if (elementoDestino && elementoDestino.classList.contains('btn-a')) {
                comprobarRespuesta(elementoDestino, elementoDestino.innerText);
            } else {
                if (botonPreguntaActivo) botonPreguntaActivo.classList.remove('selected');
                seleccionadoId = null;
            }
        }

        function comprobarRespuesta(elResp, textoRespuestaClick) {
            if (seleccionadoId === null) return;
            const m = document.getElementById('modal');
            const i = document.getElementById('img-resultado');
            m.style.display = 'block';
            
            const parejaSeleccionada = pares.find(p => p.id === seleccionadoId);

            if (parejaSeleccionada && parejaSeleccionada.a === textoRespuestaClick) {
                let puntosGanados = parejaSeleccionada.bonus ? 30 : 10;
                totalPuntos += puntosGanados;
                aciertosContador++;
                document.getElementById('puntos').innerText = totalPuntos;

                m.style.backgroundImage = "url('im/pngwing.com.png')"; 
                i.src = corr[Math.floor(Math.random() * corr.length)];
                
                const fxCorrecto = audiosCorrectos[Math.floor(Math.random() * audiosCorrectos.length)];
                let audioC = new Audio(fxCorrecto);
                audioC.volume = globalVolEfectos; // Volumen maestro
                audioC.play().catch(e => {});

                if (botonPreguntaActivo) botonPreguntaActivo.style.display = 'none';
                elResp.style.display = 'none';
                seleccionadoId = null; botonPreguntaActivo = null;

                if (aciertosContador === totalParejas) { setTimeout(activarPantallaVictoria, 1000); }
            } else {
                let puntosPerdidos = (parejaSeleccionada && parejaSeleccionada.bonus) ? 15 : 5;
                if (totalPuntos > 0) { totalPuntos -= puntosPerdidos; if (totalPuntos < 0) totalPuntos = 0; }
                document.getElementById('puntos').innerText = totalPuntos;

                m.style.backgroundImage = "url('im/pngwing.com (1).png')";
                i.src = incorr[Math.floor(Math.random() * incorr.length)];

                const fxIncorrecto = audiosIncorrectos[Math.floor(Math.random() * audiosIncorrectos.length)];
                let audioI = new Audio(fxIncorrecto);
                audioI.volume = globalVolEfectos; // Volumen maestro
                audioI.play().catch(e => {});

                if (botonPreguntaActivo) botonPreguntaActivo.classList.remove('selected');
                seleccionadoId = null; botonPreguntaActivo = null;
            }
            setTimeout(() => m.style.display = 'none', 1000);
        }

        function activarPantallaVictoria() {
            if (audioFondo) audioFondo.pause();
            const tiempoFin = new Date();
            const diferenciaSegundos = Math.floor((tiempoFin - tiempoInicio) / 1000);
            const minutos = Math.floor(diferenciaSegundos / 60);
            const segundos = diferenciaSegundos % 60;
            const duracionFormateada = `${minutos}m ${segundos}s`;

            const promesaGuardadoFinal = guardarEnHistorial(nombreUsuario, totalPuntos, duracionFormateada);

            const pantalla = document.getElementById('pantalla-victoria');
            const video = document.getElementById('video-ganador');
            const bloqueContenido = document.getElementById('contenido-victoria');

            pantalla.style.display = 'block';
            video.volume = globalVolEfectos;
            if (video.readyState < 2) video.load();
            video.play().catch(err => console.log("Permiso requerido para video"));

            setTimeout(() => { bloqueContenido.classList.add('animacion-explosiva'); }, 200);
            video.onended = function() {
                Promise.resolve(promesaGuardadoFinal).finally(() => {
                    pantalla.style.display = 'none';
                    document.getElementById('pantalla-login').style.display = 'flex';
                    actualizarPantallaHistorial();
                    // Pausa visible para verificar el ranking antes de reiniciar la partida.
                    setTimeout(() => { location.reload(); }, 8000);
                });
            };
        }


        let guardadoFinalRealizado = false;

        function actualizarEstadoRankingGlobal(texto, estado) {
            const estadoDiv = document.getElementById('estado-ranking-global');
            if (!estadoDiv) return;
            estadoDiv.innerText = texto;
            estadoDiv.classList.remove('online', 'offline', 'error');
            if (estado) estadoDiv.classList.add(estado);
        }

        function renderizarHistorialEnPantalla(historial, origen = 'local') {
            const lista = document.getElementById('lista-historial-login');
            if (!lista) return;
            if (!historial || historial.length === 0) {
                lista.innerHTML = '<div style="color:#aaa; text-align:center; padding: 10px;">No hay partidas registradas aún</div>';
                return;
            }
            lista.innerHTML = "";
            historial.forEach((partida, index) => {
                lista.innerHTML += `<div class="item-historial"><strong>#${index + 1} - ${partida.nombre}</strong><br>🎯 Puntos: ${partida.puntos} | ⏱️ ${partida.duracion} <br><span style="font-size:11px; color:#aaa;">Fecha: ${partida.fecha}${origen === 'global' ? ' | Global' : ' | Local'}</span></div>`;
            });
        }

        function guardarEnHistorial(nombre, puntos, duracion) {
            let historial = JSON.parse(localStorage.getItem('historialMatematico')) || [];
            const nuevaPartida = { nombre: nombre, puntos: puntos, duracion: duracion, fecha: new Date().toLocaleDateString() };
            historial.unshift(nuevaPartida);
            localStorage.setItem('historialMatematico', JSON.stringify(historial));
            actualizarPantallaHistorial();
        }

        function actualizarPantallaHistorial() {
            const lista = document.getElementById('lista-historial-login');
            if (!lista) return Promise.resolve();
            let historialLocal = JSON.parse(localStorage.getItem('historialMatematico')) || [];
            historialLocal = ordenarHistorial(historialLocal);
            localStorage.setItem('historialMatematico', JSON.stringify(historialLocal));
            renderizarHistorialEnPantalla(historialLocal.slice(0, 20), 'local');

            if (window.cargarRankingGlobal) {
                actualizarEstadoRankingGlobal('Ranking global: conectando...', 'offline');
                return window.cargarRankingGlobal()
                    .then(rankingGlobal => {
                        renderizarHistorialEnPantalla(rankingGlobal, 'global');
                        actualizarEstadoRankingGlobal('Ranking global: en línea', 'online');
                    })
                    .catch(error => {
                        console.error('Error cargando ranking global:', error);
                        actualizarEstadoRankingGlobal('Ranking global: sin conexión, usando historial local', 'offline');
                    });
            } else {
                actualizarEstadoRankingGlobal('Ranking global: cargando Firebase...', 'offline');
                return Promise.resolve();
            }
        }
        window.addEventListener('firebase-ranking-listo', () => { actualizarPantallaHistorial(); });

        function resetearHistorial() {
            const password = prompt("Ingrese la contraseña de 4 dígitos para borrar el historial:");

            if (password === null) return;

            if (password === "1701") {
                if (confirm("¿Está seguro de eliminar todo el historial?")) {
                    localStorage.removeItem('historialMatematico');
                    actualizarPantallaHistorial();
                    alert("Historial local eliminado correctamente. El ranking global no se borra desde el juego.");
                }
            } else {
                alert("Contraseña incorrecta.");
            }
        }

    </script>
