<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Juego Matemático</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px;
            background-image: url('im/fondo.png');
            background-size: cover; background-position: center;
            background-attachment: fixed; background-repeat: no-repeat;
            user-select: none; -webkit-user-select: none;
        }

        .titulo-imagen { display: block; margin: 10px auto; max-width: 350px; height: auto; }

        #panel-lateral {
            position: fixed; top: 20px; right: 20px;
            width: 260px; display: flex; flex-direction: column; gap: 15px;
            z-index: 100;
        }

        #marcador-puntos {
            background: rgba(0, 0, 0, 0.85); color: #ffd700;
            padding: 15px; border-radius: 15px;
            font-size: 22px; font-weight: bold;
            border: 2px solid #ffd700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        .wrapper { 
            display: inline-block; 
            background-color: rgba(255, 255, 255, 0.5); 
            border-radius: 20px; padding: 20px;
            margin-top: 10px;
            position: relative;
            z-index: 10;
        }

        .container { 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            position: relative;
        }

        .column { width: 500px; display: flex; flex-direction: column; align-items: center; }

        .column h2 {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 42px; color: #5D4037; 
            margin: 0 0 20px 0; text-transform: uppercase; letter-spacing: 2px;
        }

        .grid-botones { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; justify-items: center; }

        .linea-divisoria {
            width: 4px; background-color: #8D6E63; 
            align-self: stretch; margin: 0 40px; border-radius: 2px; 
        }

        .btn-q, .btn-a { 
            width: 85px; height: 85px; 
            border: 3px solid rgba(0,0,0,0.3); border-radius: 50%; 
            font-size: 20px; font-weight: bold; color: black; 
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: background-color 0.2s ease, transform 0.2s ease;
            box-sizing: border-box; position: relative; z-index: 12;
        }

        .btn-q { background-color: #FFD700; cursor: grab; touch-action: none; } 
        .btn-a { background-color: #32CD32; } 

        .btn-q:hover { background-color: #ffea61; transform: scale(1.05); }
        .btn-q:active { cursor: grabbing; }

        .btn-q.selected { 
            background-color: #3498db; color: white; border-color: #1e88e5; 
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.7); 
        }

        .raiz-container { display: inline-flex; align-items: center; position: relative; padding-left: 0.7em; pointer-events: none; }
        .raiz-container::before { content: "√"; position: absolute; left: 0; font-size: 1.1em; }
        .raiz-container::after { content: ""; position: absolute; top: 1px; left: 0.6em; right: 0; border-top: 2px solid black; }

        #reiniciar { position: fixed; top: 20px; left: 20px; width: 70px; cursor: pointer; z-index: 100; }
        #cerrar { position: fixed; top: 20px; left: 105px; width: 70px; cursor: pointer; z-index: 100; }

        #historial {
            position: fixed;
            top: 105px;
            left: 20px;
            width: 70px;
            cursor: pointer;
            z-index: 100;
        }
        
        #canvas-linea { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1000; }

        #modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 320px; padding: 30px; border-radius: 30px; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8); z-index: 2000;
            background-size: cover; background-position: center;
        }
        #img-resultado { width: 100%; max-width: 200px; margin: 0 auto; display: block; }

        /* PANTALLA DE LOGEO Y CONTROLES DE AUDIO */
        #pantalla-login {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.9); z-index: 3000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        
        .login-box {
            background: rgba(255, 255, 255, 0.1); padding: 30px 40px; border-radius: 20px;
            border: 2px solid #cc0000; box-shadow: 0 0 30px rgba(204, 0, 0, 0.5);
            color: white; max-width: 400px; width: 80%;
        }
        
        .login-box h2 { margin-top: 0; margin-bottom: 20px; font-size: 28px; color: #ffd700; text-shadow: 1px 1px 5px black; }
        
        .login-box input[type="text"] {
            width: 90%; padding: 12px; font-size: 18px; border-radius: 10px; border: none;
            margin-bottom: 20px; text-align: center; font-weight: bold;
        }

        /* ESTILOS DEL PANEL DE AUDIO */
        .panel-audio {
            background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px;
            margin-bottom: 20px; border: 1px solid #555; text-align: left;
        }

        .control-volumen { margin-bottom: 15px; }
        .control-volumen:last-child { margin-bottom: 0; }
        
        .control-volumen label {
            display: flex; justify-content: space-between;
            font-size: 14px; font-weight: bold; color: #ccc; margin-bottom: 5px;
        }

        .control-volumen input[type="range"] {
            width: 100%; cursor: pointer; accent-color: #32CD32;
        }

        .login-box button {
            padding: 12px 30px; font-size: 18px; font-weight: bold; background: #32CD32;
            color: white; border: none; border-radius: 10px; cursor: pointer; transition: 0.2s; width: 100%;
        }
        .login-box button:hover { background: #28a428; transform: scale(1.05); }

        #historial-login-box {
            background: rgba(0, 0, 0, 0.85); color: white;
            padding: 15px 20px; border-radius: 15px; margin-top: 20px;
            border: 2px solid #ffd700; box-shadow: 0 0 25px rgba(255, 215, 0, 0.4);
            width: 380px; max-height: 180px; overflow-y: auto; text-align: left; font-size: 14px;
        }
        #historial-login-box h3 { 
            margin: 0 0 10px 0; color: #ffd700; text-align: center; 
            font-size: 18px; border-bottom: 2px solid #ffd700; padding-bottom: 5px;
            font-family: 'Impact', sans-serif; letter-spacing: 1px;
        }
        .item-historial { padding: 6px 0; border-bottom: 1px dashed rgba(255,255,255,0.2); line-height: 1.4; }
        .item-historial:last-child { border: none; }

        #pantalla-victoria {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: black; z-index: 4000; overflow: hidden;
        }
        #video-ganador { width: 100%; height: 100%; object-fit: cover; }
        #contenido-victoria {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            z-index: 4001; text-align: center; opacity: 0; width: 90%;
        }
        #imagen-fin-juego { max-width: 800px; width: 85vw; height: auto; filter: drop-shadow(0 0 50px rgba(255, 215, 0, 0.9)); }

        .animacion-explosiva { animation: estallido 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, brilloContinuo 2s infinite ease-in-out 0.6s; }
        @keyframes estallido { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.8; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        @keyframes brilloContinuo { 0% { filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.7)); } 50% { filter: drop-shadow(0 0 50px rgba(255, 69, 0, 1)); } 100% { filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.7)); } }
    
        /* --- DISEÑO ESTRICTO DE DOS COLUMNAS PARALELAS (PC Y CELULAR) --- */
        .wrapper {
            display: inline-block;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            padding: 10px;
            margin-top: 10px;
            position: relative;
            z-index: 10;
            max-width: 98vw;
            box-sizing: border-box;
        }

        .container { 
            display: flex; 
            flex-direction: row !important; /* Fuerza las columnas lado a lado siempre */
            justify-content: center; 
            align-items: flex-start;
            position: relative;
            gap: 10px;
            width: 100%;
        }

        .column { 
            width: 48vw !important; /* Reparte el ancho de la pantalla a la mitad equitativamente */
            max-width: 460px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            box-sizing: border-box;
        }

        .column h2 {
            font-size: clamp(20px, 4vw, 42px) !important; /* Letras de títulos adaptables */
            margin-bottom: 10px;
        }

        .grid-botones { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr) !important; /* Cambia a 4 columnas fijas para que quepan */
            gap: 8px !important; 
            justify-items: center; 
            width: 100%;
        }

        /* Botones totalmente responsivos basados en el ancho de pantalla */
        .btn-q, .btn-a { 
            width: 10vw !important;
            height: 10vw !important;
            max-width: 85px !important;
            max-height: 85px !important;
            min-width: 42px !important;
            min-height: 42px !important;
            font-size: clamp(10px, 2vw, 20px) !important; /* Texto interno escala para no desbordar */
            border-width: 2px !important;
        }

        .linea-divisoria {
            width: 3px !important;
            margin: 0 5px !important;
        }

        /* Ajustes específicos para pantallas de celular */
        @media (max-width: 768px) {
            body { padding: 5px; }
            .titulo-imagen { max-width: 70vw; margin: 5px auto; }
            
            #panel-lateral { 
                position: static; 
                width: 90%; 
                max-width: 320px; 
                margin: 5px auto; 
            }
            #marcador-puntos { padding: 8px; font-size: 16px; }
            
            .controles-navegacion-movil { 
                text-align: center; 
                margin: 5px auto; 
                position: relative; 
                z-index: 105; 
            }
            #reiniciar, #cerrar, #historial { 
                position: static; 
                width: 45px; 
                height: auto; 
                margin: 0 8px; 
                display: inline-block; 
            }
        }

    </style>
</head>
<body>

    <canvas id="canvas-linea"></canvas>

    <div id="pantalla-login">
        <div class="login-box">
            <h2>¡Bienvenido!</h2>
            
            <input type="text" id="nombre-jugador" placeholder="Ingresa tu nombre..." autocomplete="off">
            
            <div class="panel-audio">
                <div class="control-volumen">
                    <label>🎵 Música de Fondo <span id="val-vol-musica">40%</span></label>
                    <input type="range" id="vol-musica" min="0" max="100" value="40" oninput="probarVolumenMusica(this.value)">
                </div>
                <div class="control-volumen">
                    <label>🔊 Efectos <span id="val-vol-efectos">100%</span></label>
                    <input type="range" id="vol-efectos" min="0" max="100" value="100" oninput="probarVolumenEfectos(this.value)">
                </div>
            </div>

            <button onclick="iniciarJuego()">Iniciar Partida</button>
        </div>
        
        <div id="historial-login-box">
            <h3>🏆 MEJORES PUNTAJES 🏆</h3>
            <div id="lista-historial-login"></div>
        </div>
    </div>

    <div id="panel-lateral">
        <div id="marcador-puntos">
            <div style="font-size: 14px; color: #aaa; margin-bottom: 5px;" id="jugador-actual">Jugador: -</div>
            Puntos: <span id="puntos">0</span>
        </div>
    </div>

    <div class="controles-navegacion-movil">
        <img id="reiniciar" src="im/Reiniciar.png" onclick="ejecutarReset()" title="Reiniciar Partida">
        <img id="cerrar" src="im/cerrar.png" onclick="cerrarJuego()" title="Cerrar Juego">
        <img id="historial" src="im/historial.png" onclick="resetearHistorial()" title="Borrar Historial">
    </div>

    <img class="titulo-imagen" src="im/titulo.png" alt="Ejercicios Matemáticos">

    <div class="wrapper">
        <div class="container">
            <div class="column">
                <h2>Preguntas</h2>
                <div class="grid-botones" id="col-preguntas"></div>
            </div>
            
            <div class="linea-divisoria"></div>
            
            <div class="column">
                <h2>Respuestas</h2>
                <div class="grid-botones" id="col-respuestas"></div>
            </div>
        </div>
    </div>

    <div id="modal">
        <img id="img-resultado" src="">
    </div>

    <div id="pantalla-victoria">
        <video id="video-ganador" src="im/youwin.mp4" preload="none"></video>
        <div id="contenido-victoria">
            <img id="imagen-fin-juego" src="im/fin_juego.png" alt="Fin del Juego">
        </div>
    </div>

    <script>
        let canvas, ctx;
        let audioFondo = null; 

        // VARIABLES GLOBALES DE VOLUMEN
        let globalVolMusica = 0.40;
        let globalVolEfectos = 1.00;

        // INSTANCIAS PARA TESTEO PREVIO (Se cargan los primeros audios de las listas)
        const testAudioMusica = new Audio("au/c1.mp3");
        const testAudioEfecto = new Audio("au/rc1.mp3");
        let timeoutMusica;

        const audiosMúsica = ["au/c1.mp3", "au/c2.mp3", "au/c3.mp3", "au/c4.mp3", "au/c5.mp3", "au/c6.mp3"];
        const audiosCorrectos = ["au/rc1.mp3", "au/rc2.mp3", "au/rc3.mp3", "au/rc4.mp3", "au/rc5.mp3", "au/rc6.mp3", "au/rc7.mp3", "au/rc8.mp3"];
        const audiosIncorrectos = ["au/ri1.mp3", "au/ri2.mp3", "au/ri3.mp3", "au/ri4.mp3", "au/ri5.mp3", "au/ri6.mp3", "au/ri7.mp3", "au/ri8.mp3"];

        document.addEventListener("DOMContentLoaded", () => {

            const volMusicaGuardado = localStorage.getItem('volMusica');
            const volEfectosGuardado = localStorage.getItem('volEfectos');

            if (volMusicaGuardado !== null) {
                document.getElementById('vol-musica').value = volMusicaGuardado;
                document.getElementById('val-vol-musica').innerText = volMusicaGuardado + '%';
                globalVolMusica = volMusicaGuardado / 100;
            }

            if (volEfectosGuardado !== null) {
                document.getElementById('vol-efectos').value = volEfectosGuardado;
                document.getElementById('val-vol-efectos').innerText = volEfectosGuardado + '%';
                globalVolEfectos = volEfectosGuardado / 100;
            }

            actualizarPantallaHistorial();
            canvas = document.getElementById("canvas-linea");
            ctx = canvas.getContext("2d");
            ajustarCanvas();
            window.addEventListener("resize", ajustarCanvas);
        });

        // FUNCIONES PARA EL POTENCIÓMETRO DE MÚSICA
        function probarVolumenMusica(valor) {
            globalVolMusica = valor / 100;
            localStorage.setItem('volMusica', valor);
            document.getElementById('val-vol-musica').innerText = valor + '%';
            testAudioMusica.volume = globalVolMusica;
            
            // Reproducir si está pausado
            if (testAudioMusica.paused) {
                testAudioMusica.play().catch(e => console.log("Se requiere interacción previa del usuario"));
            }
            
            // Pausar automáticamente 1.5 segundos después de dejar de mover el deslizador
            clearTimeout(timeoutMusica);
            timeoutMusica = setTimeout(() => {
                testAudioMusica.pause();
            }, 1500);
        }

        // FUNCIONES PARA EL POTENCIÓMETRO DE EFECTOS
        function probarVolumenEfectos(valor) {
            globalVolEfectos = valor / 100;
            localStorage.setItem('volEfectos', valor);
            document.getElementById('val-vol-efectos').innerText = valor + '%';
            testAudioEfecto.volume = globalVolEfectos;
            
            // Solo reiniciamos el sonido si ya terminó, para evitar efecto "ametralladora" al arrastrar
            if (testAudioEfecto.paused) {
                testAudioEfecto.currentTime = 0;
                testAudioEfecto.play().catch(e => console.log("Se requiere interacción previa del usuario"));
            }
        }

        function ajustarCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        const pares = [
            { id: 0, q: '<span class="raiz-container">1</span>', a: "1" }, 
            { id: 1, q: '<span class="raiz-container">4</span>', a: "2" },
            { id: 2, q: '<span class="raiz-container">9</span>', a: "3" }, 
            { id: 3, q: '<span class="raiz-container">16</span>', a: "4" },
            { id: 4, q: '<span class="raiz-container">25</span>', a: "5" }, 
            { id: 5, q: '<span class="raiz-container">36</span>', a: "6" },
            { id: 6, q: '<span class="raiz-container">49</span>', a: "7" }, 
            { id: 7, q: '<span class="raiz-container">64</span>', a: "8" },
            { id: 8, q: '<span class="raiz-container">81</span>', a: "9", bonus: true }, 
            { id: 9, q: '<span class="raiz-container">100</span>', a: "10", bonus: true },
            { id: 10, q: '<span class="raiz-container">121</span>', a: "11", bonus: true }, 
            { id: 11, q: '<span class="raiz-container">144</span>', a: "12", bonus: true },
            { id: 12, q: "1²", a: "1" }, 
            { id: 13, q: "2²", a: "4" }, 
            { id: 14, q: "3²", a: "9" }, 
            { id: 15, q: "4²", a: "16" },
            { id: 16, q: "5²", a: "25" }, 
            { id: 17, q: "6²", a: "36" }, 
            { id: 18, q: "7²", a: "49" }, 
            { id: 19, q: "8²", a: "64" },
            { id: 20, q: "9²", a: "81", bonus: true }, 
            { id: 21, q: "10²", a: "100", bonus: true }, 
            { id: 22, q: "11²", a: "121", bonus: true }, 
            { id: 23, q: "12²", a: "144", bonus: true }
        ];

        const corr = ["im/Correcta1.png", "im/Correcta2.png", "im/Correcta3.png"];
        const incorr = ["im/incorrecta1.png", "im/incorrecta2.png", "im/incorrecta3.png"];

        let seleccionadoId = null; 
        let botonPreguntaActivo = null;
        let estaArrastrando = false;
        let puntoInicioX = 0, puntoInicioY = 0;
        let totalPuntos = 0, aciertosContador = 0;
        const totalParejas = pares.length;
        let nombreUsuario = "", tiempoInicio = null;

        function iniciarJuego() {
            const input = document.getElementById('nombre-jugador');
            if (input.value.trim() === "") {
                alert("Por favor, ingresa un nombre válido para comenzar.");
                return;
            }
            
            // Detenemos cualquier testeo de audio que estuviera sonando
            testAudioMusica.pause();
            testAudioEfecto.pause();

            nombreUsuario = input.value.trim();
            document.getElementById('jugador-actual').innerText = `Jugador: ${nombreUsuario}`;
            
            let audioGo = new Audio("au/Go.mp3");
            audioGo.volume = globalVolEfectos; // Aplicamos volumen maestro de efectos
            audioGo.play().catch(e => console.log("Audio Bloqueado"));

            document.getElementById('pantalla-login').style.display = 'none';
            
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {});
            }
            tiempoInicio = new Date();

            reproducirMusicaAleatoria();
        }

        function reproducirMusicaAleatoria() {
            const cancionElegida = audiosMúsica[Math.floor(Math.random() * audiosMúsica.length)];
            audioFondo = new Audio(cancionElegida);
            audioFondo.loop = true;
            audioFondo.volume = globalVolMusica; // Aplicamos volumen maestro de música
            audioFondo.play().catch(e => console.log("Música en espera"));
        }

        function ejecutarReset() {
            let audioReset = new Audio("au/reset.mp3");
            audioReset.volume = globalVolEfectos;
            audioReset.play().catch(e => {});
            setTimeout(() => { location.reload(); }, 500);
        }

        function cerrarJuego() {
            if (confirm("¿Seguro que deseas salir del juego y cerrar la página?")) {
                window.close();
                setTimeout(() => { alert("Para salir por completo, cierra la pestaña."); }, 300);
            }
        }

        function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }
        
        const preg = shuffle([...pares]);
        const resp = shuffle([...pares]);

        const colPreguntas = document.getElementById('col-preguntas');
        preg.forEach(p => {
            const btn = document.createElement('button');
            btn.className = 'btn-q'; btn.innerHTML = p.q; btn.dataset.id = p.id;
            btn.addEventListener('mousedown', (e) => iniciarArrastre(btn, p.id, e.clientX, e.clientY));
            btn.addEventListener('touchstart', (e) => {
                const t = e.touches[0]; iniciarArrastre(btn, p.id, t.clientX, t.clientY);
            }, {passive: true});
            colPreguntas.appendChild(btn);
        });
        
        const colRespuestas = document.getElementById('col-respuestas');
        resp.forEach(r => {
            const btn = document.createElement('button');
            btn.className = 'btn-a'; btn.innerText = r.a; btn.dataset.id = r.id; 
            colRespuestas.appendChild(btn);
        });

        window.addEventListener('mousemove', (e) => moverArrastre(e.clientX, e.clientY));
        window.addEventListener('touchmove', (e) => {
            if (!estaArrastrando) return;
            const t = e.touches[0]; moverArrastre(t.clientX, t.clientY);
        }, {passive: false});

        window.addEventListener('mouseup', (e) => finalizarArrastre(e.clientX, e.clientY));
        window.addEventListener('touchend', (e) => {
            if (!estaArrastrando) return;
            const t = e.changedTouches[0]; finalizarArrastre(t.clientX, t.clientY);
        });

        function iniciarArrastre(btn, id, clientX, clientY) {
            document.querySelectorAll('.btn-q').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            seleccionadoId = id; botonPreguntaActivo = btn; estaArrastrando = true;
            const rect = btn.getBoundingClientRect();
            puntoInicioX = rect.left + rect.width / 2; puntoInicioY = rect.top + rect.height / 2;
        }

        function moverArrastre(clientX, clientY) {
            if (!estaArrastrando) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath(); ctx.moveTo(puntoInicioX, puntoInicioY); ctx.lineTo(clientX, clientY);
            ctx.strokeStyle = '#00d2ff'; ctx.lineWidth = 6; ctx.lineCap = 'round';
            ctx.shadowBlur = 12; ctx.shadowColor = 'rgba(0, 210, 255, 0.8)'; ctx.stroke();
        }

        function finalizarArrastre(clientX, clientY) {
            if (!estaArrastrando) return;
            estaArrastrando = false;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let elementoDestino = document.elementFromPoint(clientX, clientY);
            if (elementoDestino && elementoDestino.classList.contains('btn-a')) {
                comprobarRespuesta(elementoDestino, elementoDestino.innerText);
            } else {
                if (botonPreguntaActivo) botonPreguntaActivo.classList.remove('selected');
                seleccionadoId = null;
            }
        }

        function comprobarRespuesta(elResp, textoRespuestaClick) {
            if (seleccionadoId === null) return;
            const m = document.getElementById('modal');
            const i = document.getElementById('img-resultado');
            m.style.display = 'block';
            
            const parejaSeleccionada = pares.find(p => p.id === seleccionadoId);

            if (parejaSeleccionada && parejaSeleccionada.a === textoRespuestaClick) {
                let puntosGanados = parejaSeleccionada.bonus ? 30 : 10;
                totalPuntos += puntosGanados;
                aciertosContador++;
                document.getElementById('puntos').innerText = totalPuntos;

                m.style.backgroundImage = "url('im/pngwing.com.png')"; 
                i.src = corr[Math.floor(Math.random() * corr.length)];
                
                const fxCorrecto = audiosCorrectos[Math.floor(Math.random() * audiosCorrectos.length)];
                let audioC = new Audio(fxCorrecto);
                audioC.volume = globalVolEfectos; // Volumen maestro
                audioC.play().catch(e => {});

                if (botonPreguntaActivo) botonPreguntaActivo.style.visibility = 'hidden';
                elResp.style.visibility = 'hidden';
                seleccionadoId = null; botonPreguntaActivo = null;

                if (aciertosContador === totalParejas) { setTimeout(activarPantallaVictoria, 1000); }
            } else {
                let puntosPerdidos = (parejaSeleccionada && parejaSeleccionada.bonus) ? 15 : 5;
                if (totalPuntos > 0) { totalPuntos -= puntosPerdidos; if (totalPuntos < 0) totalPuntos = 0; }
                document.getElementById('puntos').innerText = totalPuntos;

                m.style.backgroundImage = "url('im/pngwing.com (1).png')";
                i.src = incorr[Math.floor(Math.random() * incorr.length)];

                const fxIncorrecto = audiosIncorrectos[Math.floor(Math.random() * audiosIncorrectos.length)];
                let audioI = new Audio(fxIncorrecto);
                audioI.volume = globalVolEfectos; // Volumen maestro
                audioI.play().catch(e => {});

                if (botonPreguntaActivo) botonPreguntaActivo.classList.remove('selected');
                seleccionadoId = null; botonPreguntaActivo = null;
            }
            setTimeout(() => m.style.display = 'none', 1000);
        }

        function activarPantallaVictoria() {
            if (audioFondo) audioFondo.pause();
            const tiempoFin = new Date();
            const diferenciaSegundos = Math.floor((tiempoFin - tiempoInicio) / 1000);
            const minutos = Math.floor(diferenciaSegundos / 60);
            const segundos = diferenciaSegundos % 60;
            const duracionFormateada = `${minutos}m ${segundos}s`;

            guardarEnHistorial(nombreUsuario, totalPuntos, duracionFormateada);

            const pantalla = document.getElementById('pantalla-victoria');
            const video = document.getElementById('video-ganador');
            const bloqueContenido = document.getElementById('contenido-victoria');

            pantalla.style.display = 'block';
            video.volume = globalVolEfectos; // Opcional, pero ideal para alinear todos los niveles
            video.play().catch(err => console.log("Permiso requerido para video"));

            setTimeout(() => { bloqueContenido.classList.add('animacion-explosiva'); }, 200);
            video.onended = function() { pantalla.style.display = 'none'; location.reload(); };
        }

        function guardarEnHistorial(nombre, puntos, duracion) {
            let historial = JSON.parse(localStorage.getItem('historialMatematico')) || [];
            const nuevaPartida = { nombre: nombre, puntos: puntos, duracion: duracion, fecha: new Date().toLocaleDateString() };
            historial.unshift(nuevaPartida);
            localStorage.setItem('historialMatematico', JSON.stringify(historial));
            actualizarPantallaHistorial();
        }

        function actualizarPantallaHistorial() {
            const lista = document.getElementById('lista-historial-login');
            let historial = JSON.parse(localStorage.getItem('historialMatematico')) || [];
            
            if (historial.length === 0) {
                lista.innerHTML = '<div style="color:#aaa; text-align:center; padding: 10px;">No hay partidas registradas aún</div>'; return;
            }

            lista.innerHTML = "";
            historial.forEach(partida => {
                lista.innerHTML += `<div class="item-historial"><strong>${partida.nombre}</strong><br>🎯 Puntos: ${partida.puntos} | ⏱️ ${partida.duracion} <br><span style="font-size:11px; color:#aaa;">Fecha: ${partida.fecha}</span></div>`;
            });
        }
        function resetearHistorial() {
            const password = prompt("Ingrese la contraseña de 4 dígitos para borrar el historial:");

            if (password === null) return;

            if (password === "1701") {
                if (confirm("¿Está seguro de eliminar todo el historial?")) {
                    localStorage.removeItem('historialMatematico');
                    actualizarPantallaHistorial();
                    alert("Historial eliminado correctamente.");
                }
            } else {
                alert("Contraseña incorrecta.");
            }
        }

    </script>
</body>
</html>
